include-file = $HOME/.config/polybar/colors.ini
include-file = $HOME/.config/polybar/modules.ini

[bar/main]
width = 100%
height =  25
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

padding-left = 2
padding-right = 2

module-margin = 1

separator = |
separator-foreground = ${colors.yellow}

font-0 = Iosevka Custom ExtraBold:size=10:style=extrabold;2
font-1 = Iosevka Nerd Font Propo:size=14;2

modules-left = xworkspaces
modules-right = pulseaudio network battery date
