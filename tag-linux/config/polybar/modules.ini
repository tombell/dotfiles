[module/xworkspaces]
type = internal/xworkspaces

; Override the CWM group names, and set nogroup to empty
icon-0 = nogroup;
icon-1 = one;1
icon-2 = two;2
icon-3 = three;3
icon-4 = four;4

; Used for the currently selected workspaces
label-active = %icon%
label-active-foreground = ${colors.magenta}
label-active-background = ${colors.background}
label-active-underline = ${colors.magenta}
label-active-padding = 1

; Used for workspaces at least one window
label-occupied = %icon%
label-occupied-foreground = ${colors.yellow}
label-occupied-padding = 1

; Used for workspaces containing a window that is demanding attention
label-urgent = %icon%
label-urgent-foreground = ${colors.alert}
label-urgent-background = ${colors.background}
label-urgent-underline = ${colors.alert}
label-urgent-padding = 1

; Used for workspaces without windows
label-empty = %icon%
label-empty-foreground = ${colors.foreground}
label-empty-background = ${colors.background}
label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

label-muted = 
label-muted-foreground = ${colors.red}

[module/network]
type = internal/network
interface = wlan0
interval = 5.0

format-connected = <label-connected>
label-connected = 󰖩 %essid%

label-disconnected = 󰤫
label-disconnected-foreground = ${colors.red}

[module/battery]
type = internal/battery

low-at = 10
battery = BAT0
adapter = AC

format-full = <ramp-capacity> <label-full>
label-full = %percentage%%

format-low = <ramp-capacity> <label-low> <animation-low>
label-low = %percentage%%

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-framerate = 1000

animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200

[module/date]
type = internal/date

time = %H:%M

format = <label>
label = %time%
