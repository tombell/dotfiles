monitor = eDP-1, preferred, 0x0, 1

# TODO: there is a weird issue with hypridle after exiting hyprland
# possibly related https://github.com/hyprwm/hypridle/issues/171
# exec-once = hypridle
exec-once = mako
exec-once = swayosd-server
exec-once = hyprpaper
exec-once = waybar

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_STYLE_OVERRIDE,kvantum
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland

xwayland {
  force_zero_scaling = true
}

ecosystem {
  no_update_news = true
  no_donation_nag = true
}

input {
  kb_layout = gb
  kb_options = ctrl:nocaps

  touchpad {
    clickfinger_behavior = true
  }
}

general {
  gaps_in = 10
  gaps_out = 20

  border_size = 2

  col.active_border = rgba(51,204,255,0.933) rgba(0,255,153,0.933) 45deg
  col.inactive_border = rgba(89,89,89,0.666)

  resize_on_border = true
}

decoration {
  rounding = 5
  rounding_power = 2

  active_opacity = 1.0
  inactive_opacity = 0.9

  blur {
    enabled = true
    size = 3
    passes = 1

    vibrancy = 0.1696
  }

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(26,26,26,0.933)
  }
}

animations {
  enabled = true

  bezier = easeOutQuint,0.23,1,0.32,1
  bezier = easeInOutCubic,0.65,0.05,0.36,1
  bezier = linear,0,0,1,1
  bezier = almostLinear,0.5,0.5,0.75,1.0
  bezier = quick,0.15,0,0.1,1

  animation = global, 1, 10, default
  animation = border, 1, 5.39, easeOutQuint
  animation = windows, 1, 4.79, easeOutQuint
  animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
  animation = windowsOut, 1, 1.49, linear, popin 87%
  animation = fadeIn, 1, 1.73, almostLinear
  animation = fadeOut, 1, 1.46, almostLinear
  animation = fade, 1, 3.03, quick
  animation = layers, 1, 3.81, easeOutQuint
  animation = layersIn, 1, 4, easeOutQuint, fade
  animation = layersOut, 1, 1.5, linear, fade
  animation = fadeLayersIn, 1, 1.79, almostLinear
  animation = fadeLayersOut, 1, 1.39, almostLinear
  animation = workspaces, 0, 0, ease
}

dwindle {
  pseudotile = true
  preserve_split = true
}

master {
  new_status = master
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  force_default_wallpaper = 0
}

bind = SUPER, RETURN, exec, ghostty
bind = SUPER, SPACE, exec, wofi --show drun

bind = SUPER, F, fullscreen, 1
bind = SUPER, M, exit,
bind = SUPER, V, togglefloating,
bind = SUPER, W, killactive,

bind = SUPER, P, pseudo, # dwindle
bind = SUPER, J, togglesplit, # dwindle

bind = SUPER, left, movefocus, l
bind = SUPER, down, movefocus, d
bind = SUPER, up, movefocus, u
bind = SUPER, right, movefocus, r

bind = SUPER, TAB, cyclenext
bind = SUPER, TAB, bringactivetotop

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

bindel = , XF86AudioRaiseVolume, exec, $osdclient --output-volume raise
bindel = , XF86AudioLowerVolume, exec, $osdclient --output-volume lower
bindel = , XF86AudioMute, exec, $osdclient --output-volume mute-toggle
bindel = , XF86AudioMicMute, exec, $osdclient --input-volume mute-toggle

bindel = , XF86MonBrightnessUp, exec, $osdclient --brightness raise
bindel = , XF86MonBrightnessDown, exec, $osdclient --brightness lower

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

windowrule = float, tag:floating-window
windowrule = center, tag:floating-window
windowrule = size 800 600, tag:floating-window

windowrule = tag +floating-window, class:(dev.tombell.impala|dev.tombell.wiremix)
windowrule = tag +floating-window, class:(xdg-desktop-portal-gtk), title:^(Open.*Files?|Open Folder|Save.*Files?|Save.*As|Save|All Files)
