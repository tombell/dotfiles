set -g default-terminal "$TERM"
set -ga terminal-overrides ",$TERM:Tc"

set -s escape-time 0

set -g history-limit 5000

set -g base-index 1
setw -g pane-base-index 1

set -g renumber-windows on

set -g mouse on

################################################################################
# STATUS
################################################################################

color_bg="#1a1b26"
color_fg="#c0caf5"
color_11="#e0af68"
color_13="#bb9af7"
color_surface0="#16161e"
color_overlay0="#292e42"

set -g status-style "bg=#{color_bg},fg=#{color_fg}"

set -g window-status-current-format " #[fg=#{color_11}]#I#[fg=#{color_13}]: #W "
set -g window-status-format " #I: #W "

set -g status-left "#[bg=#{color_bg},fg=#{color_13}]#[bg=#{color_13},fg=#{color_bg}] #S #[bg=#{color_bg},fg=#{color_13}]#[bg=#{color_bg}] "
set -g status-right ""
set -g status-left-length "20"

set -g pane-border-style "fg=#{color_surface0}"
set -g pane-active-border-style "fg=#{color_overlay0}"

################################################################################
# BINDS
################################################################################

bind-key s split-window
bind-key v split-window -h

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key space display-popup -E tmux-select-session
