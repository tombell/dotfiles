root: ~/Code/madesuper

sessions:
  - name: supercycle
    root: ./supercycle
    after_start:
      - tmux select-window -t 1
    windows:
      - name: app
        root: ./web
        commands:
          - bin/rails s -p 58802
      - name: jobs
        root: ./web
        commands:
          - bin/jobs
      - name: mcp
        root: ./web
        # commands:
        #   - bin/rails s -p 62770 -c mcp.ru -P tmp/pids/mcp.pid
      - name: vite(theme)
        root: ./extensions/theme
        commands:
          - yarn vite:dev
      - name: vite(frontend)
        root: ./web/frontend
        commands:
          - yarn vite --port 3000
      - name: shopify
        root: ./
        commands:
          - shopify app dev
      - name: tunnel
        root: ./
        commands:
          - bin/tunnel -n tom
